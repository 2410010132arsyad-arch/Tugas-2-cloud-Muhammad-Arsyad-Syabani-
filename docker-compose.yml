version: '3.8'

services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: tugas2-cloud-web
    image: tugas2-cloud:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/hello"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tugas-network

networks:
  tugas-network:
    driver: bridge
